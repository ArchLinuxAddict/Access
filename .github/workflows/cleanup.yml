name: Clean Expired Keys

on:
  schedule:
    - cron: '0 0 * * *' 
  workflow_dispatch: 

jobs:
  remove-expired-keys:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          
      - name: Run Cleanup Script
        run: python cleanup.py 
        
      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: Auto-removed expired FG Mod keys"
          file_pattern: "*.json" # This ensures all 3 files are tracked and committed
